# System packages required by WeasyPrint for PDF generation.
# Railway's Nixpacks builder reads this file during the build phase.
# Uses nixPkgs (not aptPkgs) so libraries are on the Nix LD path.
[phases.setup]
nixPkgs = [
  "pango",
  "cairo",
  "gdk-pixbuf",
  "glib",
  "fontconfig",
  "freetype",
  "harfbuzz",
  "shared-mime-info",
]
