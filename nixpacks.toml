# System packages required by WeasyPrint for PDF generation.
# Railway's Nixpacks builder reads this file during the build phase.
#
# aptPkgs installs Debian packages alongside the Nix-managed Python.
# LD_LIBRARY_PATH is set at runtime in entrypoint.sh (not here) to
# avoid poisoning the Nix-managed Python during the build phase.
[phases.setup]
aptPkgs = [
  "libpango-1.0-0",
  "libpangocairo-1.0-0",
  "libpangoft2-1.0-0",
  "libcairo2",
  "libgdk-pixbuf-2.0-0",
  "libffi-dev",
  "libglib2.0-0",
  "shared-mime-info",
]
